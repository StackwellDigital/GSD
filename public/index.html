<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Get Shit Done</title>
<style>
  :root{
    --bg:#0d0f12;
    --panel:#15181d;
    --border:#262b33;
    --text:#e7e9ec;
    --dim:#8a919c;
    --accent:#ff5c3c;
    --q1:#4fd1c5;
    --q5:#7cc576;
    --q15:#e0c341;
    --q60:#ef7c5f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'SF Mono','Consolas',monospace;
    padding:20px 14px 60px;
    max-width:640px;
    margin:0 auto;
  }
  h1{
    font-size:1.3rem;
    letter-spacing:1px;
    margin:0 0 2px;
    text-transform:uppercase;
  }
  h1 span{color:var(--accent);}
  .subtitle{
    color:var(--dim);
    font-size:0.8rem;
    margin-bottom:4px;
  }
  .shared-note{
    color:var(--accent);
    font-size:0.75rem;
    margin-bottom:16px;
  }
  .add-row{
    display:flex;
    gap:6px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  input[type=text]{
    flex:1;
    min-width:150px;
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 12px;
    border-radius:8px;
    font-family:inherit;
    font-size:0.95rem;
  }
  select{
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 8px;
    border-radius:8px;
    font-family:inherit;
  }
  button{
    font-family:inherit;
    cursor:pointer;
  }
  .btn-add{
    background:var(--accent);
    border:none;
    color:#111;
    font-weight:700;
    padding:10px 16px;
    border-radius:8px;
  }
  .btn-add:disabled{opacity:0.5;cursor:default;}
  .status-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:var(--dim);
    font-size:0.78rem;
    margin-bottom:18px;
    border-bottom:1px solid var(--border);
    padding-bottom:10px;
  }
  .btn-newday{
    background:none;
    border:1px solid var(--border);
    color:var(--dim);
    padding:6px 10px;
    border-radius:6px;
    font-size:0.75rem;
  }
  .btn-newday:hover{border-color:var(--accent);color:var(--accent);}
  .quadrant{margin-bottom:18px;}
  .quadrant-header{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.75rem;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--dim);
    margin-bottom:6px;
  }
  .dot{width:9px;height:9px;border-radius:50%;}
  .task-list{display:flex;flex-direction:column;gap:6px;}
  .task{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 12px;
  }
  .task.done{opacity:0.45;}
  .task.done .task-text{text-decoration:line-through;color:var(--dim);}
  .checkbox{
    width:20px;height:20px;
    min-width:20px;
    border-radius:50%;
    border:2px solid var(--dim);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:0.75rem;
  }
  .task.done .checkbox{background:var(--accent);border-color:var(--accent);color:#111;}
  .task-text{flex:1;font-size:0.92rem;word-break:break-word;}
  .task-text.rollover::before{content:"↺ ";color:var(--accent);}
  .del-btn{background:none;border:none;color:var(--dim);font-size:1rem;padding:2px 6px;}
  .del-btn:hover{color:var(--accent);}
  .all-done{text-align:center;padding:40px 10px;color:var(--dim);}
  .all-done .big{font-size:2rem;margin-bottom:6px;}
</style>
</head>
<body>

<h1>Get Shit <span>Done</span></h1>
<div class="subtitle" id="dateLabel">loading...</div>
<div class="shared-note">⚡ shared list — anyone with this link sees the same tasks</div>

<div class="add-row">
  <input type="text" id="taskInput" placeholder="what needs doing?" maxlength="140">
  <select id="quadSelect">
    <option value="1">1 min</option>
    <option value="5" selected>5 min</option>
    <option value="15">15 min</option>
    <option value="60">1 hour</option>
  </select>
  <button class="btn-add" id="addBtn">Add</button>
</div>

<div class="status-bar">
  <span id="progressLabel">loading...</span>
  <button class="btn-newday" id="newDayBtn">Start New Day →</button>
</div>

<div id="quadrants"></div>

<script>
const QUADRANTS = [
  {key:'1', label:'1 min', color:'var(--q1)'},
  {key:'5', label:'5 min', color:'var(--q5)'},
  {key:'15', label:'15 min', color:'var(--q15)'},
  {key:'60', label:'1 hour', color:'var(--q60)'}
];

let tasks = [];

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function fmtDateLabel(){
  return new Date().toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'});
}

async function api(path, opts){
  const res = await fetch(path, opts);
  if(!res.ok) throw new Error('request failed: ' + res.status);
  return res.json();
}

async function loadState(){
  document.getElementById('dateLabel').textContent = fmtDateLabel();
  try{
    const data = await api('/api/state?date=' + encodeURIComponent(todayStr()));
    tasks = data.tasks || [];
  }catch(e){
    console.error(e);
    document.getElementById('progressLabel').textContent = 'connection error';
  }
  render();
}

async function addTask(){
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if(!text) return;
  const quadrant = document.getElementById('quadSelect').value;
  const btn = document.getElementById('addBtn');
  btn.disabled = true;
  try{
    await api('/api/tasks', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text, quadrant})
    });
    input.value = '';
    await loadState();
  }catch(e){ console.error(e); }
  btn.disabled = false;
  input.focus();
}

async function toggleDone(id){
  try{
    await api('/api/tasks/' + encodeURIComponent(id), { method:'PATCH' });
    await loadState();
  }catch(e){ console.error(e); }
}

async function deleteTask(id){
  try{
    await api('/api/tasks/' + encodeURIComponent(id), { method:'DELETE' });
    await loadState();
  }catch(e){ console.error(e); }
}

async function rollover(){
  if(!confirm('Roll unfinished tasks to the top and clear completed ones?')) return;
  try{
    await api('/api/rollover', { method:'POST' });
    await loadState();
  }catch(e){ console.error(e); }
}

function render(){
  const openCount = tasks.filter(t=>!t.done).length;
  const doneCount = tasks.filter(t=>t.done).length;
  document.getElementById('progressLabel').textContent =
    openCount === 0 && doneCount > 0 ? `all done · ${doneCount} knocked out`
    : `${openCount} open · ${doneCount} done`;

  const container = document.getElementById('quadrants');
  container.innerHTML = '';

  if(tasks.length === 0){
    container.innerHTML = `<div class="all-done"><div class="big">🎯</div>List's empty. Add something above.</div>`;
    return;
  }

  QUADRANTS.forEach(q=>{
    const items = tasks.filter(t=>t.quadrant===q.key);
    if(items.length === 0) return;

    const wrap = document.createElement('div');
    wrap.className = 'quadrant';

    const header = document.createElement('div');
    header.className = 'quadrant-header';
    header.innerHTML = `<span class="dot" style="background:${q.color}"></span> ${q.label}`;
    wrap.appendChild(header);

    const list = document.createElement('div');
    list.className = 'task-list';

    const sorted = [...items].sort((a,b)=>{
      if(a.done !== b.done) return a.done ? 1 : -1;
      if(a.rollover !== b.rollover) return a.rollover ? -1 : 1;
      return 0;
    });

    sorted.forEach(t=>{
      const row = document.createElement('div');
      row.className = 'task' + (t.done ? ' done' : '');
      row.innerHTML = `
        <div class="checkbox">${t.done ? '✓' : ''}</div>
        <div class="task-text${t.rollover ? ' rollover' : ''}">${escapeHtml(t.text)}</div>
        <button class="del-btn">✕</button>
      `;
      row.querySelector('.checkbox').addEventListener('click', ()=>toggleDone(t.id));
      row.querySelector('.del-btn').addEventListener('click', ()=>deleteTask(t.id));
      list.appendChild(row);
    });

    wrap.appendChild(list);
    container.appendChild(wrap);
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('addBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter') addTask();
});
document.getElementById('newDayBtn').addEventListener('click', rollover);

loadState();
</script>

</body>
</html>
